name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Adicionar plataforma Android (se ainda não existir)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sincronizar arquivos web com o projeto Android
        run: npx cap sync android

      - name: Dar permissão de execução ao gradlew
        run: chmod +x android/gradlew

      - name: Buildar APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Publicar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: treino-calistenia-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
